version: "3.8"

services:
  # ── Frontend Next.js ──────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gestao_frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://nginx/api
    depends_on:
      - backend
    networks:
      - app_network

  # ── Backend C# ASP.NET Core ───────────────────────────────────────────────
  # Coloque o binário publicado em ./backend/publish antes de subir.
  # Exemplo: dotnet publish -c Release -o ./backend/publish
  backend:
    image: mcr.microsoft.com/dotnet/aspnet:8.0
    container_name: gestao_backend
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__Default=${DB_CONNECTION_STRING}
    volumes:
      - ./backend/publish:/app
    working_dir: /app
    command: ["dotnet", "GestaoLocacoes.Api.dll"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network

  # ── Banco de dados PostgreSQL ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: gestao_db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-gestao_locacoes}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?DB password obrigatório}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # ── Nginx reverse proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: gestao_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  db_data:
